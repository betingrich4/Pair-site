<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Offline | Connection Lost</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0B1120;
            background-image: radial-gradient(circle at 30% 20%, #111827, #030712);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* OFFLINE PAGE - full container */
        .offline-page {
            max-width: 600px;
            width: 100%;
            background: rgba(8, 14, 26, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 64px;
            padding: 32px 24px 44px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            text-align: center;
        }

        /* offline illustration */
        .offline-art {
            position: relative;
            width: 200px;
            height: 170px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .offline-svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 8px 18px rgba(0,0,0,0.5));
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.55);
            padding: 8px 24px;
            border-radius: 100px;
            margin-bottom: 24px;
            backdrop-filter: blur(5px);
        }
        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f97316;
            box-shadow: 0 0 10px #f97316;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1);}
            50% { opacity: 0.6; transform: scale(0.95);}
        }
        .status-label {
            color: #e2edff;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(125deg, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .sub {
            color: #8ba3cf;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .retry-button {
            background: linear-gradient(100deg, #1e293b, #0f172a);
            border: none;
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 50px;
            color: #f1f5f9;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
            margin-top: 8px;
            width: 80%;
        }
        .retry-button:active {
            transform: scale(0.97);
        }

        /* game section */
        .game-divider {
            margin-top: 36px;
            padding-top: 20px;
        }
        .game-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #bfd6ff;
            margin-bottom: 20px;
        }
        .game-header span {
            background: #0f172fcc;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin: 16px 0 18px;
        }

        .card {
            background: radial-gradient(ellipse at 30% 35%, #111c2e, #071222);
            aspect-ratio: 1 / 1;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.6);
            color: #facc15;
            font-family: monospace;
        }
        .card.flipped, .card.matched {
            background: linear-gradient(145deg, #1f4172, #0f2846);
            transform: scale(0.96);
            color: #fde047;
        }
        .card.matched {
            background: #0f3b2c;
            cursor: default;
            filter: drop-shadow(0 0 6px #2dd4bf);
            opacity: 0.9;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a1022cc;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5e6;
            margin-top: 16px;
        }
        .reset-btn {
            background: #2d3b57;
            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .reset-btn:active {
            transform: scale(0.95);
        }
        .footnote {
            font-size: 0.7rem;
            color: #5f7fae;
            margin-top: 18px;
        }
        .toast-msg {
            background: #10b981dd;
            color: #052e1a;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            margin-top: 12px;
            display: inline-block;
        }

        @media (max-width: 550px) {
            .offline-page { padding: 22px 16px 34px; border-radius: 48px; }
            .memory-grid { gap: 10px; }
            .card { font-size: 1.6rem; border-radius: 20px; }
            h2 { font-size: 1.7rem; }
            .retry-button { width: 90%; }
            .offline-art { width: 150px; height: 130px; }
        }
        @media (max-width: 450px) {
            .memory-grid { gap: 8px; }
            .card { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            // --------------------------------------------------------------
            // SUCCESS PAGE RENDER (Checklist JSON style - circle + checkmark)
            // This completely replaces the offline page
            // --------------------------------------------------------------
            function renderSuccessPage() {
                // Replace entire body content with success animation
                document.body.innerHTML = `
                    <style>
                        * {
                            margin: 0;
                            padding: 0;
                            box-sizing: border-box;
                        }
                        body {
                            min-height: 100vh;
                            background: #0B1120;
                            background-image: radial-gradient(circle at 30% 20%, #111827, #030712);
                            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            padding: 20px;
                        }
                        .success-page {
                            max-width: 500px;
                            width: 100%;
                            background: rgba(8, 14, 26, 0.85);
                            backdrop-filter: blur(20px);
                            border-radius: 64px;
                            padding: 48px 32px;
                            text-align: center;
                            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
                            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
                        }
                        @keyframes fadeInUp {
                            from {
                                opacity: 0;
                                transform: translateY(30px);
                            }
                            to {
                                opacity: 1;
                                transform: translateY(0);
                            }
                        }
                        .success-svg-container {
                            margin: 0 auto 24px;
                            width: 160px;
                            height: 160px;
                        }
                        .success-title {
                            font-size: 2rem;
                            font-weight: 700;
                            background: linear-gradient(125deg, #10b981, #34d399);
                            -webkit-background-clip: text;
                            background-clip: text;
                            color: transparent;
                            margin-bottom: 12px;
                        }
                        .success-message {
                            color: #8ba3cf;
                            font-size: 1rem;
                            margin-bottom: 32px;
                        }
                        .redirect-timer {
                            color: #5f7fae;
                            font-size: 0.85rem;
                            margin-top: 20px;
                        }
                        .progress-bar {
                            width: 80%;
                            height: 3px;
                            background: #1e293b;
                            border-radius: 10px;
                            margin: 20px auto 0;
                            overflow: hidden;
                        }
                        .progress-fill {
                            width: 0%;
                            height: 100%;
                            background: linear-gradient(90deg, #10b981, #34d399);
                            border-radius: 10px;
                            animation: fillProgress 1.2s linear forwards;
                        }
                        @keyframes fillProgress {
                            from { width: 0%; }
                            to { width: 100%; }
                        }
                    </style>
                    <div class="success-page">
                        <div class="success-svg-container" id="successAnimation"></div>
                        <div class="success-title">Connection Restored</div>
                        <div class="success-message">You're back online! Redirecting to main site...</div>
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                        <div class="redirect-timer" id="timerText">Redirecting in 2 seconds</div>
                    </div>
                `;

                // Render the Checklist-style success animation (circle + checkmark)
                const container = document.getElementById('successAnimation');
                if (container) {
                    container.innerHTML = `
                        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <!-- Background circle (like the Checklist JSON's green circle) -->
                            <circle cx="100" cy="100" r="88" stroke="#10b981" stroke-width="6" fill="none" stroke-dasharray="553" stroke-dashoffset="553">
                                <animate attributeName="stroke-dashoffset" from="553" to="0" dur="0.6s" begin="0s" fill="freeze"/>
                            </circle>
                            <!-- Filled circle (like the fill effect from JSON) -->
                            <circle cx="100" cy="100" r="88" fill="#10b981" fill-opacity="0">
                                <animate attributeName="fill-opacity" from="0" to="0.15" dur="0.4s" begin="0.3s" fill="freeze"/>
                            </circle>
                            <!-- Checkmark (inspired by Checklist JSON path) -->
                            <path d="M68 104 L90 126 L134 80" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="100" stroke-dashoffset="100">
                                <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.45s" begin="0.35s" fill="freeze"/>
                            </path>
                            <!-- Rotating trim circle accent (like the rotating circle in Checklist) -->
                            <circle cx="100" cy="100" r="95" stroke="#34d399" stroke-width="3" stroke-dasharray="8 20" fill="none" opacity="0.7">
                                <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="3s" repeatCount="indefinite"/>
                            </circle>
                            <!-- Sparkle dots -->
                            <circle cx="48" cy="48" r="4" fill="#facc15" opacity="0">
                                <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="0.5s" repeatCount="2"/>
                            </circle>
                            <circle cx="152" cy="48" r="3" fill="#f97316" opacity="0">
                                <animate attributeName="opacity" values="0;1;0" dur="0.7s" begin="0.7s" repeatCount="2"/>
                            </circle>
                            <circle cx="152" cy="152" r="3.5" fill="#60a5fa" opacity="0">
                                <animate attributeName="opacity" values="0;1;0" dur="0.9s" begin="0.6s" repeatCount="2"/>
                            </circle>
                            <circle cx="48" cy="152" r="3" fill="#c084fc" opacity="0">
                                <animate attributeName="opacity" values="0;1;0" dur="0.75s" begin="0.8s" repeatCount="2"/>
                            </circle>
                        </svg>
                    `;
                }

                // Timer countdown and redirect
                let seconds = 2;
                const timerEl = document.getElementById('timerText');
                const countdown = setInterval(() => {
                    seconds--;
                    if (timerEl) timerEl.textContent = `Redirecting in ${seconds} second${seconds !== 1 ? 's' : ''}`;
                    if (seconds <= 0) {
                        clearInterval(countdown);
                        window.location.href = '/';
                    }
                }, 1000);
                // Fallback redirect
                setTimeout(() => {
                    window.location.href = '/';
                }, 2500);
            }

            // --------------------------------------------------------------
            // OFFLINE PAGE WITH GAME (No emoji, shape memory)
            // --------------------------------------------------------------
            let redirectTriggered = false;
            let autoInterval = null;

            const shapeSymbols = ["⬟", "◈", "⨀", "⬚", "▣", "▧", "✧", "◉"];
            let gameDeck = [];
            let flippedIndices = [];
            let matchedSet = new Set();
            let currentMoves = 0;
            let matchedPairs = 0;
            let gameLock = false;
            const totalPairsCount = shapeSymbols.length;

            function shuffleArray(arr) {
                for(let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function initGame() {
                let cards = [...shapeSymbols, ...shapeSymbols];
                gameDeck = shuffleArray(cards);
                flippedIndices = [];
                matchedSet.clear();
                currentMoves = 0;
                matchedPairs = 0;
                gameLock = false;
                updateStats();
                renderBoard();
            }

            function updateStats() {
                const matchedSpan = document.getElementById('matchedCount');
                const movesSpan = document.getElementById('movesCount');
                if (matchedSpan) matchedSpan.innerText = matchedPairs;
                if (movesSpan) movesSpan.innerText = currentMoves;
            }

            function renderBoard() {
                const boardContainer = document.getElementById('gameBoard');
                if (!boardContainer) return;
                boardContainer.innerHTML = '';
                gameDeck.forEach((symbol, idx) => {
                    const card = document.createElement('div');
                    card.classList.add('card');
                    if(matchedSet.has(idx)) {
                        card.classList.add('matched');
                        card.innerText = symbol;
                    } else if(flippedIndices.includes(idx)) {
                        card.classList.add('flipped');
                        card.innerText = symbol;
                    } else {
                        card.innerText = "?";
                    }
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if(gameLock) return;
                        if(matchedSet.has(idx)) return;
                        if(flippedIndices.includes(idx)) return;
                        if(flippedIndices.length === 2) return;
                        
                        flippedIndices.push(idx);
                        renderBoard();
                        
                        if(flippedIndices.length === 2) {
                            currentMoves++;
                            updateStats();
                            const [idxA, idxB] = flippedIndices;
                            if(gameDeck[idxA] === gameDeck[idxB]) {
                                matchedSet.add(idxA);
                                matchedSet.add(idxB);
                                matchedPairs++;
                                updateStats();
                                flippedIndices = [];
                                renderBoard();
                                if(matchedPairs === totalPairsCount) {
                                    const toastDiv = document.getElementById('toastContainer');
                                    if(toastDiv) {
                                        toastDiv.innerHTML = '<div class="toast-msg">PERFECT! Game completed</div>';
                                        setTimeout(() => toastDiv.innerHTML = '', 2800);
                                    }
                                }
                            } else {
                                gameLock = true;
                                setTimeout(() => {
                                    flippedIndices = [];
                                    gameLock = false;
                                    renderBoard();
                                }, 750);
                            }
                        }
                    });
                    boardContainer.appendChild(card);
                });
            }

            function attachGameEvents() {
                const resetBtn = document.getElementById('resetGameBtn');
                if (resetBtn) {
                    resetBtn.addEventListener('click', () => {
                        initGame();
                        const toastDiv = document.getElementById('toastContainer');
                        if(toastDiv) {
                            toastDiv.innerHTML = '<div class="toast-msg">New game · match all shapes</div>';
                            setTimeout(() => toastDiv.innerHTML = '', 1800);
                        }
                    });
                }
            }

            // Build offline page HTML
            function buildOfflinePage() {
                return `
                    <div class="offline-page">
                        <div class="offline-art">
                            <svg class="offline-svg" viewBox="0 0 280 220" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M140 160 C 105 160, 75 142, 55 118" stroke="#64748b" stroke-width="7" stroke-linecap="round" fill="none" stroke-dasharray="6 8"/>
                                <path d="M140 135 C 115 135, 93 122, 78 103" stroke="#64748b" stroke-width="7" stroke-linecap="round" fill="none"/>
                                <path d="M140 112 C 124 112, 110 101, 100 88" stroke="#64748b" stroke-width="7" stroke-linecap="round" fill="none"/>
                                <circle cx="140" cy="182" r="10" fill="#f97316"/>
                                <rect x="138" y="152" width="4" height="20" rx="2" fill="#f97316"/>
                                <line x1="60" y1="60" x2="220" y2="170" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
                                <path d="M180 68 L205 92" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
                                <path d="M230 68 L205 92" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
                                <circle cx="205" cy="92" r="16" fill="none" stroke="#ef4444" stroke-width="5"/>
                                <text x="198" y="99" font-size="16" fill="#ef4444" font-weight="bold">!</text>
                                <circle cx="140" cy="75" r="32" stroke="#a855f7" stroke-width="3" stroke-dasharray="8 10" fill="none" opacity="0.7">
                                    <animateTransform attributeName="transform" type="rotate" from="0 140 75" to="360 140 75" dur="6s" repeatCount="indefinite"/>
                                </circle>
                                <circle cx="140" cy="75" r="48" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="6 12" fill="none" opacity="0.5">
                                    <animateTransform attributeName="transform" type="rotate" from="360 140 75" to="0 140 75" dur="8s" repeatCount="indefinite"/>
                                </circle>
                            </svg>
                        </div>

                        <div class="status-pill">
                            <div class="led"></div>
                            <span class="status-label">offline · auto-recovery</span>
                        </div>

                        <h2>No Internet Connection</h2>
                        <p class="sub">Auto-retry every 7 seconds · play game while waiting</p>

                        <button class="retry-button" id="manualRetryBtn">Check Connection Now</button>

                        <div class="game-divider">
                            <div class="game-header">
                                <span>SHAPE MEMORY</span>
                            </div>
                            <div class="memory-grid" id="gameBoard"></div>
                            <div class="stats-row">
                                <span>PAIRS: <span id="matchedCount">0</span> / <span id="totalPairsSpan">8</span></span>
                                <span>MOVES: <span id="movesCount">0</span></span>
                                <button class="reset-btn" id="resetGameBtn">NEW GAME</button>
                            </div>
                            <div class="footnote">geometric symbols · match each pair</div>
                            <div id="toastContainer" style="margin-top: 12px;"></div>
                        </div>
                    </div>
                `;
            }

            // Network monitoring - replaces page with success when online
            function startNetworkMonitoring() {
                // Check immediately
                if (navigator.onLine && !redirectTriggered) {
                    redirectTriggered = true;
                    renderSuccessPage();
                    return;
                }

                // Set up interval to check connection
                autoInterval = setInterval(() => {
                    if (redirectTriggered) return;
                    
                    // Check via fetch to be accurate
                    fetch('/favicon.ico', { method: 'HEAD', cache: 'no-store', mode: 'no-cors' })
                        .then(() => {
                            if (navigator.onLine && !redirectTriggered) {
                                redirectTriggered = true;
                                clearInterval(autoInterval);
                                renderSuccessPage();
                            }
                        })
                        .catch(() => {
                            if (navigator.onLine && !redirectTriggered) {
                                redirectTriggered = true;
                                clearInterval(autoInterval);
                                renderSuccessPage();
                            }
                        });
                }, 7000);

                // Also listen to online event
                window.addEventListener('online', () => {
                    if (!redirectTriggered) {
                        redirectTriggered = true;
                        if (autoInterval) clearInterval(autoInterval);
                        renderSuccessPage();
                    }
                });
            }

            // Manual retry
            function setupManualRetry() {
                const btn = document.getElementById('manualRetryBtn');
                if (btn) {
                    btn.addEventListener('click', () => {
                        if (redirectTriggered) return;
                        fetch('/favicon.ico', { method: 'HEAD', cache: 'no-store' })
                            .then(() => {
                                if (navigator.onLine && !redirectTriggered) {
                                    redirectTriggered = true;
                                    if (autoInterval) clearInterval(autoInterval);
                                    renderSuccessPage();
                                }
                            })
                            .catch(() => {
                                if (navigator.onLine && !redirectTriggered) {
                                    redirectTriggered = true;
                                    if (autoInterval) clearInterval(autoInterval);
                                    renderSuccessPage();
                                }
                            });
                    });
                }
            }

            // Initialize offline page
            function initOfflinePage() {
                const app = document.getElementById('app');
                if (app) {
                    app.innerHTML = buildOfflinePage();
                    
                    // Set total pairs text
                    const totalSpan = document.getElementById('totalPairsSpan');
                    if (totalSpan) totalSpan.innerText = totalPairsCount;
                    
                    // Initialize game
                    initGame();
                    attachGameEvents();
                    setupManualRetry();
                }
                startNetworkMonitoring();
            }

            // Start the application
            initOfflinePage();
        })();
    </script>
</body>
</html>
