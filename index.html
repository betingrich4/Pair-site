<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Offline Hub | Auto-Restore & Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0B1120, #030614);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* Main card */
        .offline-panel {
            max-width: 640px;
            width: 100%;
            background: rgba(10, 18, 30, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            padding: 28px 24px 40px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.08);
            border: 1px solid rgba(56, 189, 248, 0.35);
            transition: all 0.2s ease;
            text-align: center;
        }

        /* Ring loader container */
        .ring-loader {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas.ring-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.55);
            padding: 8px 22px;
            border-radius: 60px;
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
            font-weight: 500;
        }
        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f97316;
            box-shadow: 0 0 8px #f97316;
            transition: all 0.2s;
        }
        .status-led.online {
            background: #10b981;
            box-shadow: 0 0 14px #10b981;
        }
        .status-text {
            color: #e2e8f0;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
            font-weight: 500;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(120deg, #FFFFFF, #94a3f8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .sub-desc {
            color: #8ba3cf;
            font-size: 0.9rem;
            margin-bottom: 28px;
            padding: 0 6px;
        }

        .success-stage {
            display: flex;
            justify-content: center;
            margin: 10px 0 18px;
            min-height: 85px;
        }
        .check-svg {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 8px 20px rgba(16, 185, 129, 0.4));
        }
        .hidden {
            display: none;
        }

        button.retry-button {
            background: linear-gradient(105deg, #1e293b, #0f172a);
            border: none;
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 44px;
            color: #f1f5f9;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
            margin-top: 8px;
            width: 75%;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(56, 189, 248, 0.5);
            letter-spacing: 0.5px;
        }
        button.retry-button:active {
            transform: scale(0.97);
            background: linear-gradient(105deg, #2d3a54, #1a253f);
        }

        /* Game section - NO EMOJIS, only shapes / icons */
        .game-divider {
            margin-top: 36px;
            padding-top: 20px;
            border-top: 1px solid rgba(71, 145, 255, 0.3);
        }
        .game-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #b9d0ff;
            margin-bottom: 16px;
        }
        .game-header span {
            background: #0f172f;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.9rem;
        }
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            justify-items: center;
            align-items: center;
            margin: 20px 0 18px;
        }
        .memory-card {
            background: linear-gradient(145deg, #0e1a2a, #061020);
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 16px -5px rgba(0,0,0,0.5);
            border: 1px solid rgba(96, 165, 250, 0.5);
            color: #facc15;
        }
        .memory-card.flipped, .memory-card.matched {
            background: linear-gradient(145deg, #1f3e61, #11263e);
            transform: scale(0.96);
            border-color: #2dd4bf;
            color: #fde047;
        }
        .memory-card.matched {
            background: #166534;
            border-color: #facc15;
            cursor: default;
            filter: drop-shadow(0 0 6px #2dd4bf);
            opacity: 0.85;
        }
        .game-stats-bar {
            display: flex;
            justify-content: space-between;
            background: #0a1022cc;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5e6;
            margin-top: 14px;
            backdrop-filter: blur(4px);
        }
        .reset-game-btn {
            background: #2d3b57;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.1s;
            letter-spacing: 0.3px;
        }
        .reset-game-btn:active {
            transform: scale(0.94);
        }
        .info-message {
            font-size: 0.7rem;
            color: #5f7fae;
            margin-top: 18px;
        }
        .toast-notify {
            background: #10b981dd;
            color: #0a2c1c;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            margin-top: 12px;
            display: inline-block;
            backdrop-filter: blur(8px);
        }

        @keyframes popWin {
            0% { opacity: 0; transform: scale(0.2) rotate(-10deg);}
            70% { transform: scale(1.08);}
            100% { opacity: 1; transform: scale(1) rotate(0deg);}
        }
        .animate-check {
            animation: popWin 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }
    </style>
</head>
<body>

<div class="offline-panel" id="appContainer">
    <!-- concentric rings canvas loader -->
    <div class="ring-loader">
        <canvas id="ringLayer1" width="140" height="140" class="ring-canvas"></canvas>
        <canvas id="ringLayer2" width="140" height="140" class="ring-canvas"></canvas>
        <canvas id="ringLayer3" width="140" height="140" class="ring-canvas"></canvas>
    </div>

    <div class="status-chip">
        <div class="status-led" id="ledDot"></div>
        <span class="status-text" id="statusMessageText">🌐 scanning network...</span>
    </div>

    <h2 id="mainHeading">Connection Lost</h2>
    <p class="sub-desc" id="descriptionText">Auto-recovery active · Play the shape game while waiting</p>

    <div class="success-stage" id="successAnimationZone"></div>

    <button class="retry-button" id="forceRetryBtn">⟳ Check connection now</button>

    <!-- Memory game without emojis: abstract shape icons (geometric & symbols) -->
    <div class="game-divider">
        <div class="game-header">
            <span>✦ MEMORY MATCH ✦</span>
        </div>
        <div class="memory-grid" id="gameGridContainer"></div>
        <div class="game-stats-bar">
            <span>🏆 PAIRS: <span id="pairedCount">0</span> / <span id="totalPairsCount">8</span></span>
            <span>🖱️ MOVES: <span id="totalMoves">0</span></span>
            <button class="reset-game-btn" id="restartGameBtn">🔄 NEW GAME</button>
        </div>
        <div class="info-message">
            ⚡ Offline fun | Geometric shapes & symbols — match each pair
        </div>
    </div>
    <div id="gameToastMsg" style="margin-top: 10px;"></div>
</div>

<script>
    (function() {
        // ---------- 1. ANIMATED RINGS (Inspired by loading JSON) ----------
        const canvasRing1 = document.getElementById('ringLayer1');
        const canvasRing2 = document.getElementById('ringLayer2');
        const canvasRing3 = document.getElementById('ringLayer3');
        let ringAnimationId = null;
        let ringsActive = true;

        function drawStyledRing(ctx, cx, cy, radius, lineWidth, colorStops, alpha, dash = false) {
            ctx.clearRect(0, 0, 140, 140);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.lineWidth = lineWidth;
            const gradient = ctx.createLinearGradient(20, 20, 120, 120);
            gradient.addColorStop(0, colorStops[0]);
            gradient.addColorStop(1, colorStops[1]);
            ctx.strokeStyle = gradient;
            ctx.stroke();
            if (dash) {
                ctx.beginPath();
                ctx.setLineDash([5, 10]);
                ctx.arc(cx, cy, radius - 1.5, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            ctx.restore();
        }

        function animateRings() {
            if (!ringsActive) return;
            const time = performance.now() * 0.0045;
            const center = 70;
            // Ring 1 (inner)
            const ctx1 = canvasRing1.getContext('2d');
            const scale1 = 0.62 + Math.sin(time * 1.5) * 0.07;
            const radius1 = 28 * scale1;
            const op1 = 0.65 + Math.sin(time * 2.1) * 0.3;
            drawStyledRing(ctx1, center, center, radius1, 4.2, ['#3b82f6', '#a855f7'], op1, false);
            
            // Ring 2 (mid)
            const ctx2 = canvasRing2.getContext('2d');
            const scale2 = 0.76 + Math.sin(time * 1.2) * 0.06;
            const radius2 = 44 * scale2;
            const op2 = 0.7 + Math.sin(time * 1.7) * 0.28;
            drawStyledRing(ctx2, center, center, radius2, 4.8, ['#f59e0b', '#ec4899'], op2, true);
            
            // Ring 3 (outer)
            const ctx3 = canvasRing3.getContext('2d');
            const scale3 = 0.91 + Math.sin(time * 0.9) * 0.045;
            const radius3 = 60 * scale3;
            const op3 = 0.72 + Math.sin(time * 1.3) * 0.25;
            drawStyledRing(ctx3, center, center, radius3, 5.2, ['#10b981', '#3b82f6'], op3, false);
            
            ringAnimationId = requestAnimationFrame(animateRings);
        }
        
        function startRingLoader() {
            if (ringAnimationId) cancelAnimationFrame(ringAnimationId);
            ringsActive = true;
            animateRings();
        }
        
        function stopRingLoader() {
            ringsActive = false;
            if (ringAnimationId) {
                cancelAnimationFrame(ringAnimationId);
                ringAnimationId = null;
            }
            [canvasRing1, canvasRing2, canvasRing3].forEach(canvas => {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, 140, 140);
            });
        }
        
        // ---------- 2. CHECKMARK SUCCESS ANIMATION (SVG) ----------
        function renderSuccessCheckmark() {
            const zone = document.getElementById('successAnimationZone');
            zone.innerHTML = `
                <svg class="check-svg animate-check" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="60" cy="60" r="52" fill="#10b981" stroke="#ffffff" stroke-width="3.5" stroke-dasharray="330" stroke-dashoffset="0">
                        <animate attributeName="stroke-dashoffset" from="330" to="0" dur="0.4s" begin="0s" fill="freeze"/>
                    </circle>
                    <path d="M36 61 L52 77 L86 43" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="100" stroke-dashoffset="100">
                        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.35s" begin="0.18s" fill="freeze"/>
                    </path>
                    <circle cx="60" cy="60" r="56" fill="none" stroke="#bef264" stroke-width="2.2">
                        <animate attributeName="r" from="56" to="64" dur="0.6s" repeatCount="2"/>
                    </circle>
                </svg>
            `;
        }
        
        function clearSuccessIcon() {
            const zone = document.getElementById('successAnimationZone');
            zone.innerHTML = '';
        }
        
        // ---------- 3. NETWORK & AUTO-RECOVERY (Auto reload + main site) ----------
        let wasOnline = navigator.onLine;
        let redirectTriggered = false;
        let autoCheckInterval = null;
        
        const ledDot = document.getElementById('ledDot');
        const statusMsgSpan = document.getElementById('statusMessageText');
        const mainHeading = document.getElementById('mainHeading');
        const subDesc = document.getElementById('descriptionText');
        
        function applyOfflineUI() {
            ledDot.classList.remove('online');
            ledDot.style.background = "#f97316";
            statusMsgSpan.innerText = "⚠️ Offline · auto-reload active";
            mainHeading.innerText = "No Internet Connection";
            subDesc.innerText = "Retrying every 7 seconds. Play the game until we reconnect!";
            clearSuccessIcon();
            stopRingLoader();
            startRingLoader();
        }
        
        function handleConnectionRestored() {
            if (redirectTriggered) return;
            redirectTriggered = true;
            stopRingLoader();
            ledDot.classList.add('online');
            ledDot.style.background = "#10b981";
            statusMsgSpan.innerText = "✅ CONNECTED! Redirecting to main site...";
            mainHeading.innerText = "Back Online!";
            subDesc.innerText = "Network restored. Opening the main page.";
            renderSuccessCheckmark();
            
            if (autoCheckInterval) {
                clearInterval(autoCheckInterval);
                autoCheckInterval = null;
            }
            // small delay for success visibility then redirect to main site (current origin)
            setTimeout(() => {
                // use '/' to reload main site / index. If you need specific main domain, use '/'
                window.location.href = '/';
                // fallback if stuck
                setTimeout(() => {
                    if (!redirectTriggered) window.location.reload();
                }, 800);
            }, 1100);
        }
        
        function performNetworkPing() {
            if (redirectTriggered) return;
            // silent fetch to test connectivity (lightweight)
            fetch('/favicon.ico', { method: 'HEAD', cache: 'no-store', mode: 'no-cors' })
                .then(() => {
                    if (navigator.onLine && !redirectTriggered) {
                        handleConnectionRestored();
                    }
                })
                .catch(() => {
                    if (!navigator.onLine) return;
                    if (!redirectTriggered && navigator.onLine) handleConnectionRestored();
                });
        }
        
        function startAutoReloader() {
            if (autoCheckInterval) clearInterval(autoCheckInterval);
            autoCheckInterval = setInterval(() => {
                if (redirectTriggered) return;
                if (navigator.onLine) {
                    if (!redirectTriggered) handleConnectionRestored();
                } else {
                    statusMsgSpan.innerText = "🔄 Auto-reloading network check...";
                    fetch('/favicon.ico', { method: 'HEAD', cache: 'no-store', mode: 'no-cors' })
                        .catch(() => {});
                }
            }, 7000);
        }
        
        function manualRetry() {
            if (redirectTriggered) return;
            statusMsgSpan.innerText = "⟳ Manual retry...";
            fetch('/favicon.ico', { method: 'HEAD', cache: 'no-store' })
                .then(() => {
                    if (navigator.onLine && !redirectTriggered) handleConnectionRestored();
                    else if (!navigator.onLine) statusMsgSpan.innerText = "❌ Still offline. Keep playing!";
                })
                .catch(() => {
                    if (navigator.onLine && !redirectTriggered) handleConnectionRestored();
                    else statusMsgSpan.innerText = "Offline mode active";
                });
        }
        
        function initNetworkHandlers() {
            if (navigator.onLine && !redirectTriggered) {
                // small delay to ensure ui ready before redirect
                setTimeout(() => {
                    if (navigator.onLine && !redirectTriggered) handleConnectionRestored();
                }, 300);
            } else {
                applyOfflineUI();
                startAutoReloader();
            }
            window.addEventListener('online', () => {
                if (!redirectTriggered) handleConnectionRestored();
            });
            window.addEventListener('offline', () => {
                if (!redirectTriggered) {
                    redirectTriggered = false;
                    applyOfflineUI();
                    startAutoReloader();
                }
            });
            document.getElementById('forceRetryBtn').addEventListener('click', manualRetry);
        }
        
        // ---------- 4. MEMORY GAME (NO EMOJIS: abstract shape set: ✦ ◆ ◇ ● ○ ■ □ ▲ △) ----------
        // We use 8 unique icon-like symbols / geometric shapes
        const shapeSet = [
            "✦", "⬟", "◈", "⬤", "▣", "▧", "⬚", "⨀"
        ];  // 8 pairs => 16 cards
        
        let gameDeck = [];
        let flippedCards = [];      // store indices
        let matchedIndices = new Set();
        let currentMoves = 0;
        let matchedPairs = 0;
        let lockGame = false;
        const totalPairsCount = shapeSet.length;
        
        const gridContainer = document.getElementById('gameGridContainer');
        const pairedSpan = document.getElementById('pairedCount');
        const movesSpan = document.getElementById('totalMoves');
        const totalPairsSpan = document.getElementById('totalPairsCount');
        
        totalPairsSpan.innerText = totalPairsCount;
        
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function initGame() {
            let cards = [...shapeSet, ...shapeSet];
            gameDeck = shuffleArray(cards);
            flippedCards = [];
            matchedIndices.clear();
            currentMoves = 0;
            matchedPairs = 0;
            lockGame = false;
            updateGameStats();
            renderGameBoard();
        }
        
        function updateGameStats() {
            pairedSpan.innerText = matchedPairs;
            movesSpan.innerText = currentMoves;
        }
        
        function renderGameBoard() {
            gridContainer.innerHTML = '';
            gameDeck.forEach((symbol, idx) => {
                const cardDiv = document.createElement('div');
                cardDiv.classList.add('memory-card');
                if (matchedIndices.has(idx)) {
                    cardDiv.classList.add('matched');
                    cardDiv.innerText = symbol;
                } else if (flippedCards.includes(idx)) {
                    cardDiv.classList.add('flipped');
                    cardDiv.innerText = symbol;
                } else {
                    cardDiv.innerText = "?";
                }
                cardDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (lockGame) return;
                    if (matchedIndices.has(idx)) return;
                    if (flippedCards.includes(idx)) return;
                    if (flippedCards.length === 2) return;
                    
                    flippedCards.push(idx);
                    renderGameBoard();
                    
                    if (flippedCards.length === 2) {
                        currentMoves++;
                        updateGameStats();
                        const [idxA, idxB] = flippedCards;
                        if (gameDeck[idxA] === gameDeck[idxB]) {
                            // match success
                            matchedIndices.add(idxA);
                            matchedIndices.add(idxB);
                            matchedPairs++;
                            updateGameStats();
                            flippedCards = [];
                            renderGameBoard();
                            if (matchedPairs === totalPairsCount) {
                                const toastDiv = document.getElementById('gameToastMsg');
                                toastDiv.innerHTML = '<div class="toast-notify">🎉 VICTORY! Game completed 🎉</div>';
                                setTimeout(() => toastDiv.innerHTML = '', 2800);
                            }
                        } else {
                            lockGame = true;
                            setTimeout(() => {
                                flippedCards = [];
                                lockGame = false;
                                renderGameBoard();
                            }, 780);
                        }
                    }
                });
                gridContainer.appendChild(cardDiv);
            });
        }
        
        document.getElementById('restartGameBtn').addEventListener('click', () => {
            initGame();
            const toastMsgDiv = document.getElementById('gameToastMsg');
            toastMsgDiv.innerHTML = '<div class="toast-notify">🔄 New game — match all geometric pairs!</div>';
            setTimeout(() => toastMsgDiv.innerHTML = '', 1800);
        });
        
        // ---------- 5. BOOTSTRAP ----------
        function bootstrap() {
            startRingLoader();
            initGame();
            initNetworkHandlers();
        }
        bootstrap();
    })();
</script>
</body>
</html>
